steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'gcr.io/$PROJECT_ID/sx-dashboard-api:latest'
      - -f
      - bluesky/web/Dockerfile
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/sx-dashboard-api:latest'

images:
  - 'gcr.io/$PROJECT_ID/sx-dashboard-api:latest'
